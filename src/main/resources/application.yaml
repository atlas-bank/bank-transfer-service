spring:
  application:
    name: Atlas Transfer Service
  datasource:
    url: ${ATLAS_POSTGRESQL_URL}
    username: ${ATLAS_POSTGRESQL_USERNAME}
    password: ${ATLAS_POSTGRESQL_PASSWORD}
    driver-class-name: org.postgresql.Driver
  mvc:
    servlet:
      path: /api/v1
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update #Alterar para 'validate'
    properties:
      hibernate:
        format_sql: true
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always